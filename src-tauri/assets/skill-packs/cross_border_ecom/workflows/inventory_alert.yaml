id: inventory_alert
name: 库存巡检
description: |
  吃一份 FBA 库存 CSV 报表，跑 inventory_sentinel skill，产出
  🔴断货 / 🟡告警 / ⚫冗余 分级 + 今天就要下单 / 降广告 / 清库的
  行动项。Pack 内置 samples/fba_inventory_2026-05-08.csv 作为 demo
  数据，真实使用把 csv_path 指到 Seller Central 导出的 FBA Inventory
  Planning 报表即可。
version: 1
trigger:
  type: manual
inputs:
  - name: csv_path
    label: FBA 库存报表 CSV 路径（留空用内置 demo 数据）
    type: string
    default: ""
    required: false

steps:
  - id: load_report
    name: 读取库存报表
    type: agent
    after: []
    agent_id: hermes-default
    prompt: |
      你要读取一份 FBA 库存报表 CSV 并把原始内容原封不动传给下一步。

      csv_path 输入：`{{inputs.csv_path}}`
      - 如果非空：用 read_file 工具读该路径。
      - 如果为空：使用下面内置的 demo 内容：

      ```csv
      ASIN,Title,FBA_Available,Inbound,ETA_Days,Daily_Sales,Days_Of_Supply,Age_Days,Storage_Fee_Monthly
      B08N5WRWNW,Silicone Ice Cube Tray 4-Pack,42,0,0,8.4,5.0,45,2.10
      B09XCHM2K9,Stainless Steel Water Bottle 32oz,89,0,0,7.6,11.7,62,3.85
      B0C2VM4HPK,Wireless Earbuds Pro A14 Launch,11,240,18,0.5,22.0,3,0.48
      B07LBTQ8JM,Bamboo Cutting Board Set of 3,310,0,0,6.2,50.0,88,8.20
      B0B7FLCK5N,LED Desk Lamp with USB Charging,520,0,0,4.9,106.1,102,14.40
      B08HX2B1PX,Memory Foam Pillow Queen Size,28,600,14,9.1,3.1,51,1.95
      B09ZYBRC7V,Adjustable Laptop Stand Aluminum,1180,0,0,3.2,368.7,212,46.75
      B0BQK9YGCX,Mini Humidifier Night Light USB,64,0,0,5.8,11.0,41,2.60
      B07YLG5T3Q,Resistance Bands Exercise Set,2010,0,0,0.8,2512.5,340,96.20
      B0D4M1RNPH,Silicone Stretch Lids 14-Pack,155,480,7,11.7,13.2,23,5.80
      ```

      输出严格 JSON：`{"csv": "<原始 CSV 文本>", "source": "demo" | "file"}`
    output_format: json

  - id: analyze
    name: 库存分析（调用 inventory_sentinel skill）
    type: agent
    after: [load_report]
    agent_id: hermes-default
    prompt: |
      你是 cross_border_ecom Pack 的 inventory_sentinel skill。严格按
      该 skill 的系统提示词工作：读数 → DOS 分档 → 下行动项。

      报表 CSV 内容：
      {{steps.load_report.output.csv}}

      输出严格 JSON（结构同 inventory_sentinel skill 定义的
      summary/alerts/editor_note 三段式）。不要 markdown 包裹。
    output_format: json

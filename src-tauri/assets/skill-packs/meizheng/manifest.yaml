schema_version: 1
id: meizheng
version: "0.2.0"
title: 美正OS 自动化
description: |
  美正OS 企业 RPA Pack —— 自动更新汇率、承运商分区等数据。
  功能：中行美元汇率每日自动更新、UPS Ground 分区月度自动更新、FedEx Ground 分区月度自动更新（开发中）。
author: Corey
requires:
  corey: ">=0.2.0"

dependencies:
  python:
    - crawl4ai>=0.8.0
    - playwright>=1.40.0
  setup_script: scripts/ensure_crawl4ai.py

skills:
  - skills/meizheng_os_automation.md

workflows:
  - workflows/update-usd-exchange-rate.yaml
  - workflows/update-ups-zones.yaml

schedules:
  - id: daily-usd-rate-930
    cron: "0 30 9 * * *"
    workflow: update-usd-exchange-rate
    description: 每天 09:30 抓取中行美金汇率
  - id: daily-usd-rate-1030
    cron: "0 30 10 * * *"
    workflow: update-usd-exchange-rate
    description: 每天 10:30 兜底抓取中行美金汇率
  - id: monthly-ups-zones
    cron: "0 0 2 1 * *"
    workflow: update-ups-zones
    description: 每月1号自动下载并上传 UPS Ground 分区数据

views:
  - id: config
    title: 系统配置
    template: MeizhengConfig
    nav_section: primary
    description: 配置美正OS连接和承运商自动化参数

config_schema: []

mcp_servers: []

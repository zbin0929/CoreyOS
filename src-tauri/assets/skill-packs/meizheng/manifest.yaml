schema_version: 1
id: meizheng
version: "0.6.0"
title: 美正OS 自动化
description: |
  美正OS 企业 RPA Pack —— 自动更新汇率、燃油附加费、承运商分区等数据。
  功能：中行美元汇率每日自动更新、燃油附加费周度/月度更新、UPS/USPS/FedEx Ground 分区月度自动更新。
author: Corey
requires:
  corey: ">=0.2.0"

dependencies:
  python:
    - requests>=2.28.0
    - beautifulsoup4>=4.12.0
    - openpyxl>=3.0.0
    - xlrd==1.2.0
    - pdfplumber>=0.9.0
    - websocket-client>=1.0.0
    - pyyaml>=6.0

skills:
  - skills/meizheng_os_automation.md

workflows:
  - workflows/update-usd-exchange-rate.yaml
  - workflows/update-ups-zones.yaml
  - workflows/update-usps-zones.yaml
  - workflows/update-fedex-zones.yaml
  - workflows/update-fuel-rates-weekly.yaml
  - workflows/update-fuel-rates-monthly.yaml

schedules:
  - id: daily-usd-rate-930
    cron: "0 30 9 * * *"
    workflow: update-usd-exchange-rate
    description: 每天 09:30 抓取中行美金汇率
  - id: daily-usd-rate-1030
    cron: "0 30 10 * * *"
    workflow: update-usd-exchange-rate
    description: 每天 10:30 兜底抓取中行美金汇率
  - id: monthly-ups-zones
    cron: "0 0 2 1 * *"
    workflow: update-ups-zones
    description: 每月1号自动下载并上传 UPS Ground 分区数据
  - id: monthly-usps-zones
    cron: "0 0 3 1 * *"
    workflow: update-usps-zones
    description: 每月1号自动下载并上传 USPS Ground 分区数据
  - id: monthly-fedex-zones
    cron: "0 0 4 1 * *"
    workflow: update-fedex-zones
    description: 每月1号自动下载并上传 FedEx Ground 分区数据
  - id: weekly-fuel-rates
    cron: "0 30 23 * * 0"
    workflow: update-fuel-rates-weekly
    description: 每周日 23:30 更新 UPS + FedEx 燃油附加费
  - id: monthly-dhl-fuel
    cron: "0 0 28-31 * * *"
    workflow: update-fuel-rates-monthly
    description: 每月最后一天更新 DHL 燃油附加费

views:
  - id: dashboard
    title: 美正OS
    template: CompositeDashboard
    nav_section: primary
    description: 燃油费率、汇率、工作流一览
    # Opt out of the Amazon-flavored risk-summary header that the
    # cross-border-ecom Pack uses. Dashboard renders the layout
    # cells flat in declared order, no section headers.
    summary: none
    layout:
      # Row 1 — fuel surcharges (3 carriers across 12 cols)
      - span: 4
        view:
          id: dashboard-ups-fuel
          title: UPS 燃油附加费
          template: MetricsCard
          metrics:
            - key: ups_fuel
              label: UPS
              icon: Fuel
              stripe: amber
              format: "{rate}%"
              subtitle: "{effective_date} ~ {valid_to}"
          # TODO(meizheng-os-api): replace `static` with a live
          # data source once a `pack_data: meizheng_api` source
          # is wired (see docs/plans/v0.3.0-pack-schema-dsl.md
          # follow-ups). For now the placeholder lets the cell
          # render its zero-data UI and the Run buttons below
          # are the source of truth.
          data_source:
            static: {}
      - span: 4
        view:
          id: dashboard-fedex-fuel
          title: FedEx 燃油附加费
          template: MetricsCard
          metrics:
            - key: fedex_fuel
              label: FedEx
              icon: Fuel
              stripe: purple
              format: "{rate}%"
              subtitle: "{effective_date} ~ {valid_to}"
          data_source:
            static: {}
      - span: 4
        view:
          id: dashboard-dhl-fuel
          title: DHL 燃油附加费
          template: MetricsCard
          metrics:
            - key: dhl_fuel
              label: DHL
              icon: Fuel
              stripe: red
              format: "{rate}%"
              subtitle: "{effective_date} ~ {valid_to}"
          data_source:
            static: {}
      # Row 2 — exchange rate (8 cols) + carrier zone summary (4 cols)
      - span: 8
        view:
          id: dashboard-exchange
          title: 美元汇率
          template: MetricsCard
          metrics:
            - key: usd
              label: 中行美元现汇卖出价
              icon: DollarSign
              stripe: gold
              format: "{rate}"
              subtitle: CNY/USD
          data_source:
            static: {}
      - span: 4
        view:
          id: dashboard-zones
          title: 承运商分区
          template: MetricsCard
          metrics:
            - key: ups_zones
              label: UPS
              icon: Truck
              format: "每月更新"
            - key: usps_zones
              label: USPS
              icon: Truck
              format: "每月更新"
            - key: fedex_zones
              label: FedEx
              icon: Truck
              format: "每月更新"
          data_source:
            static: {}
      # Row 3 — automation workflows (full width)
      - span: 12
        view:
          id: dashboard-workflows
          title: 自动化工作流
          template: WorkflowLauncher
          workflows:
            - id: update-fuel-rates-weekly
              name: 燃油费率更新
              description: UPS + FedEx 燃油附加费
              schedule: 每周日 23:30
              icon: Fuel
            - id: update-fuel-rates-monthly
              name: DHL 燃油更新
              description: DHL 燃油附加费
              schedule: 每月最后一天
              icon: Fuel
            - id: update-usd-exchange-rate
              name: 美元汇率更新
              description: 中行美元现汇卖出价
              schedule: 每天 09:30 / 10:30
              icon: RefreshCw
            - id: update-ups-zones
              name: UPS 分区更新
              description: 全美 902 ZIP3
              schedule: 每月 1 号
              icon: Truck
            - id: update-usps-zones
              name: USPS 分区更新
              description: 全美 930 ZIP3
              schedule: 每月 1 号
              icon: Truck
            - id: update-fedex-zones
              name: FedEx 分区更新
              description: FedEx Ground 分区
              schedule: 每月 1 号
              icon: Truck
  - id: config
    title: 系统配置
    template: SchemaConfig
    nav_section: settings
    description: 美正OS 连接 + 承运商燃油费率自动化参数
    # No `config_file` — uses legacy `pack_config_get/set` IPC
    # which transforms `fuel-rate-config.yaml` (snake_case) into
    # camelCase for the UI and back. This is the **only** file the
    # weekly/monthly fuel-rate workflows read, so we MUST go
    # through the transform path; using `config_file` here would
    # silently fork the data into a parallel YAML.
    schema:
      - key: meizheng_os
        type: nested
        label: 美正OS 连接
        fields:
          - key: base_url
            type: text
            label: 浏览器入口 URL
            placeholder: http://dev.mazonlabel.com/ship
          - key: api_base_url
            type: text
            label: API Base URL
            placeholder: https://devgw.mazonlabel.com
          - key: credentials
            type: nested
            label: 登录凭据
            fields:
              - key: username
                type: text
                label: 用户名
                width: half
              - key: password
                type: secret
                label: 密码
                width: half
      - key: carriers
        type: record
        label: 承运商配置
        key_label: 承运商 ID（如 ups / fedex / dhl）
        add_label: 添加承运商
        fields:
          - key: name
            type: text
            label: 承运商名称
            placeholder: UPS
            width: half
          - key: enabled
            type: bool
            label: 启用
            width: half
          - key: sourceUrl
            type: text
            label: 数据源 URL
            show_if: enabled
            placeholder: "https://www.ups.com/..."
          - key: updateFrequency
            type: select
            label: 更新频率
            show_if: enabled
            options: [weekly, monthly]
            width: half
          - key: cron
            type: cron
            label: 触发时间
            show_if: enabled
          - key: validityDays
            type: number
            label: 有效期（天）
            show_if: enabled
            width: small
            help: "示例：7 / 30 / 90；-1 = 当月月末（脚本自动计算）"
          - key: services
            type: array
            label: 服务映射
            show_if: enabled
            add_label: 添加映射
            item:
              - key: sourceName
                type: text
                label: 源服务名
                placeholder: Domestic Ground Surcharge
              - key: country
                type: text
                label: 国家
                width: small
                placeholder: US
              - key: applyTo
                type: select
                label: 写入到
                options: [default, channels]
                width: half
                help: "default = 承运商默认费率；channels = 指定服务代码"
              - key: serviceCodes
                type: tag
                label: 服务代码
                show_if: "applyTo == 'channels'"
                placeholder: "NEXT_DAY_AIR, SECOND_DAY_AIR"
      - key: advanced
        type: nested
        label: 高级设置
        fields:
          - key: browserTimeout
            type: number
            label: 浏览器超时（秒）
            width: small
          - key: retryAttempts
            type: number
            label: 重试次数
            width: small
          - key: logLevel
            type: select
            label: 日志级别
            options: [debug, info, warn, error]
            width: half
  # SchemaConfig migration target — runs against the same
  # `exchange-rate-config.yaml` that the legacy
  # `<ExchangeRateConfigEditor>` writes inside the umbrella
  # MeizhengConfig view. Listed in `settings` for now so the user
  # can verify the migrated schema-driven UX side-by-side; once
  # the umbrella migration lands this hidden view will be the
  # only entry point.
  - id: exchange-rate-config
    title: 汇率配置
    template: SchemaConfig
    nav_section: settings
    description: 中行美元汇率抓取计划（schema-driven 迁移版）
    config_file: exchange-rate-config
    schema:
      - key: enabled
        type: bool
        label: 启用美金汇率自动更新
      - key: source
        type: nested
        label: 数据源
        show_if: enabled
        fields:
          - key: name
            type: text
            label: 数据源
            placeholder: 中国银行
            width: half
          - key: rateType
            type: text
            label: 汇率类型
            placeholder: 现汇卖出价
            width: half
          - key: queryKeyword
            type: text
            label: 搜索关键词
            placeholder: 美元
            help: 数据源页面上的货币名称
            width: half
          - key: earliestTime
            type: time
            label: 抓取时间起点
            help: 取此时间后第一笔汇率
            width: half
      - key: conversion
        type: nested
        label: 换算
        show_if: enabled
        fields:
          - key: divideBy
            type: number
            label: 除以系数
            width: small
            help: "示例：原始报价 ÷ 此系数 = 入库汇率"
      - key: schedules
        type: array
        label: 抓取计划
        show_if: enabled
        add_label: 添加计划
        min_items: 1
        item:
          - key: name
            type: text
            label: 计划名称
            placeholder: 计划名称（如 早盘抓取）
          - key: cron
            type: cron
            label: 调度
      - key: target
        type: nested
        label: 目标
        show_if: enabled
        fields:
          - key: currencyCode
            type: text
            label: 货币代码
            width: half
          - key: currencyName
            type: text
            label: 货币名称
            width: half
      - key: remarkTemplate
        type: text
        label: 备注模板
        show_if: enabled
        placeholder: "更新汇率{datetime}  {rate}"
        help: "支持 {datetime} 和 {rate} 占位符"
  # SchemaConfig migration target for ZoneConfigEditor — exercises
  # the new `record` field type (carriers keyed by id). Same data
  # file as the legacy umbrella view writes.
  - id: zone-config
    title: 分区配置
    template: SchemaConfig
    nav_section: settings
    description: 承运商分区自动更新（schema-driven 迁移版）
    config_file: zone-config
    schema:
      - key: carriers
        type: record
        label: 承运商
        key_label: 承运商 ID（如 ups / usps / fedex）
        add_label: 添加承运商
        min_items: 1
        fields:
          - key: enabled
            type: bool
            label: 启用此承运商分区自动更新
          - key: upload_prefix
            type: text
            label: 上传前缀
            show_if: enabled
            placeholder: UPS-GROUND
          - key: source
            type: nested
            label: 数据源
            show_if: enabled
            fields:
              - key: carrier
                type: text
                label: 承运商
                width: half
              - key: service
                type: text
                label: 服务类型
                width: half
              - key: totalZip3
                type: number
                label: ZIP3 总数
                width: small
                help: 用于校验抓取完整度
          - key: upload
            type: nested
            label: 上传参数
            show_if: enabled
            fields:
              - key: maxRetries
                type: number
                label: 最大重试次数
                width: small
              - key: retryDelay
                type: number
                label: 重试间隔（秒）
                width: small
              - key: requestInterval
                type: number
                label: 请求间隔（秒）
                width: small
          - key: schedules
            type: array
            label: 抓取计划
            show_if: enabled
            add_label: 添加计划
            min_items: 1
            item:
              - key: name
                type: text
                label: 计划名称
                placeholder: 月度分区更新
              - key: cron
                type: cron
                label: 调度
config_schema: []
mcp_servers: []

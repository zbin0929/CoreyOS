id: update-fuel-rates-monthly
name: 燃油附加费月度更新
description: |
  纯脚本抓取 DHL 燃油附加费率并更新到美正OS。
  requests 抓取页面，正则解析费率，API 创建+审核。零 LLM 消耗。
version: 5
trigger:
  type: cron
  expression: "0 0 28-31 * * *"
inputs: []

steps:
  - id: scrape_and_upload
    name: 抓取并上传 DHL 燃油费率
    type: agent
    after: []
    timeout_minutes: 10
    prompt: |
      **任务**：按顺序执行以下命令，抓取 DHL 燃油费率并上传到美正OS。

      **Step 1: 抓取 DHL 费率（有效期整月）**

      ```bash
      set -e
      SCRIPTS_DIR="$HOME/.hermes/skill-packs/meizheng/scripts"
      VENV_PYTHON="$HOME/.hermes/hermes-agent/venv/bin/python"

      "$VENV_PYTHON" "$SCRIPTS_DIR/scrape_dhl_fuel_rate.py" -1 > /tmp/dhl_fuel.json
      cat /tmp/dhl_fuel.json
      ```

      **Step 2: 上传到美正OS**

      ```bash
      "$VENV_PYTHON" "$SCRIPTS_DIR/update_fuel_rates_via_api.py" /tmp/dhl_fuel.json
      ```

      🔒 **铁律**：
      - 按顺序执行，Step 1 失败则不执行 Step 2
      - 原样返回每条命令的 stdout

id: update-ups-zones
name: UPS 分区月度更新
description: |
  下载全部 902 个 UPS Ground ZIP3 分区 XLS 数据，
  转换为美正OS模板格式并上传。包含 checkpoint 断点续传。
  对应 REQUIREMENTS.md 需求 #2。
version: 1
trigger:
  type: cron
  expression: "0 0 2 1 * *"
inputs: []

steps:
  - id: download_and_upload
    name: 下载并上传 UPS 分区数据
    type: agent
    after: []
    timeout_minutes: 120
    prompt: |
      **任务**：按顺序运行下面两条命令，原样返回每条的 stdout。

      **Step 1: 下载全部 UPS 分区 XLS**

      ```bash
      set -e
      SCRIPTS_DIR="$HOME/.hermes/skill-packs/meizheng/scripts"
      VENV_PYTHON="$HOME/.hermes/hermes-agent/venv/bin/python"

      "$VENV_PYTHON" "$SCRIPTS_DIR/download_ups_zones_browser.py" --all
      ```

      **Step 2: 上传全部分区到美正OS**

      ```bash
      "$VENV_PYTHON" "$SCRIPTS_DIR/upload_zones_meizheng.py" --all
      ```

      🔒 **铁律**：
      - 按顺序执行两条命令
      - 每条命令的 stdout 原样作为输出
      - Step 1 失败则不执行 Step 2
      - 两条命令都支持 checkpoint 断点续传，中断后重跑会跳过已完成的

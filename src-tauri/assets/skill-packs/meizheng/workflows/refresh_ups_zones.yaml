id: refresh_ups_zones
name: 更新 UPS 全美分区表
description: |
  调起 AI Browser → 自动下载 1000 个 ZIP 前缀的 UPS 分区表 .xls 文件 →
  落到 ~/.hermes/pack-data/meizheng/zone-charts/。
  约 4 分钟，0 LLM tokens（纯 CDP + JS 触发原生下载）。
  对应 REQUIREMENTS.md §2 第一行。
steps:
  - tool: bash
    cmd: |
      set -e
      mkdir -p ~/.hermes/pack-data/meizheng/zone-charts
      # 用我们已经验证可行的脚本（在 CoreyOS 仓库 scripts/ 下）
      node "${COREY_REPO_ROOT:-$HOME/AI项目/CoreyOS}/scripts/ups-zone-downloader.mjs"
      # 把下载的文件搬到 Pack 自己的数据目录（保持 ~/.hermes/downloads 干净）
      mv ~/.hermes/downloads/ups_zone_*.xls ~/.hermes/pack-data/meizheng/zone-charts/ 2>/dev/null || true
      echo "DONE — files at ~/.hermes/pack-data/meizheng/zone-charts/"
      ls ~/.hermes/pack-data/meizheng/zone-charts/ | wc -l

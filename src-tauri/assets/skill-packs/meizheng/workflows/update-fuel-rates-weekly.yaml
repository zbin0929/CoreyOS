id: update-fuel-rates-weekly
name: 燃油附加费周度更新
description: |
  纯脚本抓取 UPS 和 FedEx 燃油附加费率并更新到美正OS。
  requests 抓取页面，正则解析费率，API 创建+审核。零 LLM 消耗。
version: 5
trigger:
  type: cron
  expression: "0 30 23 * * 0"
inputs: []

steps:
  - id: scrape_and_upload
    name: 抓取并上传燃油费率
    type: agent
    after: []
    timeout_minutes: 10
    prompt: |
      **任务**：按顺序执行以下命令，抓取 UPS + FedEx 燃油费率并上传到美正OS。

      **Step 1: 抓取 UPS 费率（有效期7天）**

      ```bash
      set -e
      SCRIPTS_DIR="$HOME/.hermes/skill-packs/meizheng/scripts"
      VENV_PYTHON="$HOME/.hermes/hermes-agent/venv/bin/python"

      "$VENV_PYTHON" "$SCRIPTS_DIR/scrape_ups_fuel_rate.py" 7 > /tmp/ups_fuel.json
      cat /tmp/ups_fuel.json
      ```

      **Step 2: 抓取 FedEx 费率（有效期7天）**

      ```bash
      "$VENV_PYTHON" "$SCRIPTS_DIR/scrape_fedex_fuel_rate.py" 7 > /tmp/fedex_fuel.json
      cat /tmp/fedex_fuel.json
      ```

      **Step 3: 合并并上传到美正OS**

      ```bash
      "$VENV_PYTHON" -c "
      import json
      rates = []
      for f in ['/tmp/ups_fuel.json', '/tmp/fedex_fuel.json']:
          try:
              with open(f) as fh: rates.extend(json.load(fh))
          except: pass
      with open('/tmp/fuel_weekly.json', 'w') as fh: json.dump(rates, fh)
      print(f'Merged {len(rates)} rates')
      "

      "$VENV_PYTHON" "$SCRIPTS_DIR/update_fuel_rates_via_api.py" /tmp/fuel_weekly.json
      ```

      🔒 **铁律**：
      - 按顺序执行，前一步失败则不继续
      - 原样返回每条命令的 stdout

id: update-fedex-zones
name: FedEx Ground 分区月度更新
description: |
  通过 AI 浏览器 CDP 在 FedEx Rate Tools 页面下载分区 PDF，
  解析并转换为美正OS模板格式，上传到美正OS。
  需要预先在 AI 浏览器中打开 FedEx Rate Tools 页面并登录。
  对应 zone-config.yaml 中 fedex 配置。
version: 1
trigger:
  type: cron
  expression: "0 0 4 1 * *"
inputs: []

steps:
  - id: download_and_upload
    name: 下载并上传 FedEx Ground 分区数据
    type: agent
    after: []
    timeout_minutes: 120
    prompt: |
      **任务**：按顺序运行下面两条命令，原样返回每条的 stdout。

      **前置条件**：
      - AI 浏览器已打开 FedEx Rate Tools 页面（fedex.com）并已登录
      - 配置文件 `~/.hermes/skill-packs/meizheng/config/zone-config.yaml` 中 `fedex.origin_zip_codes` 已设置需要查询的 ZIP 码列表

      **Step 1: 下载 FedEx 分区数据**

      ```bash
      set -e
      SCRIPTS_DIR="$HOME/.hermes/skill-packs/meizheng/scripts"
      VENV_PYTHON="$HOME/.hermes/hermes-agent/venv/bin/python"
      OUTPUT_DIR="$HOME/.hermes/pack-data/meizheng/zone-charts/fedex"

      "$VENV_PYTHON" "$SCRIPTS_DIR/download_fedex_zones.py" --all --output-dir "$OUTPUT_DIR"
      ```

      **Step 2: 上传全部分区到美正OS**

      ```bash
      "$VENV_PYTHON" "$SCRIPTS_DIR/upload_zones_meizheng.py" --dir "$OUTPUT_DIR" --carrier "FedEx Ground"
      ```

      🔒 **铁律**：
      - 按顺序执行两条命令
      - 每条命令的 stdout 原样作为输出
      - Step 1 失败则不执行 Step 2

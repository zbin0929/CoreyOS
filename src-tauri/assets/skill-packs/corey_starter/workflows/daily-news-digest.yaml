id: daily-news-digest
name: 每日新闻摘要
description: 给定主题和参考链接，生成结构化的每日新闻摘要 JSON（每条带标题/摘要/影响评估），可挂 cron 每天定时跑。
version: 1
trigger:
  type: manual
inputs:
  - name: topic
    label: 主题（例如 "AI 行业 / 跨境电商 / 半导体"）
    type: string
    default: AI 行业
    required: true
  - name: sources
    label: 参考链接或关键词（逗号分隔，可留空让 LLM 自由发挥）
    type: string
    default: ""
    required: false
  - name: max_items
    label: 最多摘要条数
    type: string
    default: "5"
    required: true

steps:
  - id: digest
    name: 生成摘要
    type: agent
    after: []
    agent_id: hermes-default
    prompt: |
      你是「{{inputs.topic}}」领域的资深行业分析师。基于你的训练知识 + 以下参考线索，
      为今天产出一份结构化新闻摘要（最多 {{inputs.max_items}} 条）。

      参考线索：{{inputs.sources}}

      输出严格 JSON（不要 markdown 代码块包裹）：
      {
        "topic": "{{inputs.topic}}",
        "generated_at": <ISO 8601 时间字符串>,
        "items": [
          {
            "title":   <string>,
            "summary": <string>,           // 不超过 80 字
            "impact":  "high"|"medium"|"low",
            "tags":    [<string>, ...],    // 1-3 个
            "source_hint": <string>        // 可选，提示读者去哪查证
          }
        ],
        "editor_note": <string>            // 一句话总览今天的整体趋势
      }

      规则：
      - items 数量 ≤ {{inputs.max_items}}
      - 信息存疑就降 impact 为 low 并在 source_hint 里标注 "需核实"
      - 不要编造具体数字 / 估值 / 公司财报，宁可写定性表达
    output_format: json

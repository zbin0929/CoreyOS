# Corey default preset — generic starter content.
#
# Shipped with every Corey build via tauri.conf.json → bundle.resources.
# On first launch (or via Home → "Install preset" button), the contents
# below get copied to ~/.hermes/ — only if the targets don't already
# exist, so re-running is idempotent and never clobbers user edits.
#
# Vendor-specific presets (corey-ecommerce, corey-legal, etc.) will
# live in sibling directories with the same shape.

id: default
name: Default starter
description: >
  Generic chat skills (explain / translate / summarize / commit), four
  trusted Anthropic document-authoring skills (xlsx, docx, pdf, pptx)
  so the agent can produce real Excel / Word / PDF / PowerPoint files
  out of the box, plus a filesystem MCP for basic file access. Good
  enough to start chatting with; swap or extend once you know what you
  need.
# Bump this when adding/removing bundled skills. The frontend uses it
# to decide whether re-running preset_install is worthwhile for an
# already-onboarded user (next-skill-bundle freshness vs no-op).
version: 2

id: daily-news-digest
name: 每日新闻摘要
description: 定时搜索科技新闻，生成摘要并发送
version: 1

trigger:
  type: cron
  expression: "0 9 * * *"

inputs:
  - name: topic
    label: 新闻主题
    type: string
    default: "AI 科技"
    required: true

steps:
  - id: search
    name: 搜索新闻
    type: agent
    agent_id: hermes-default
    prompt: |
      搜索今天关于「{{inputs.topic}}」的最新新闻，找到最重要的5条，
      提取标题、来源、关键内容摘要。
    output_format: json

  - id: summarize
    name: 生成摘要
    type: agent
    after: [search]
    agent_id: hermes-default
    prompt: |
      基于以下新闻数据，生成一份简洁的每日摘要报告：
      {{search.output}}
      
      格式要求：
      1. 每条新闻一行
      2. 包含标题和关键信息
      3. 最后附上今日趋势总结
    output_format: markdown

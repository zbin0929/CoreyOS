id: competitor-price-monitor
name: 竞品价格监控
description: 定时监控竞品电商页面价格变动，生成比价报告
version: 1

trigger:
  type: cron
  expression: "0 10 * * 1-5"

inputs:
  - name: product_name
    label: 商品名称
    type: string
    default: "MacBook Pro M4"
    required: true
  - name: jd_url
    label: 京东链接
    type: string
    default: ""
    required: false
  - name: taobao_url
    label: 淘宝链接
    type: string
    default: ""
    required: false

steps:
  - id: fetch_jd
    name: 抓取京东价格
    type: browser
    tool_name: "https://www.jd.com"
    agent_id: agent
    prompt: |
      1. 在京东搜索「{{inputs.product_name}}」
      2. 找到第一个自营商品
      3. 提取：商品名称、当前价格、原价、优惠信息、评分
      4. 如果有多个规格，记录每个规格的价格
    output_format: json

  - id: fetch_taobao
    name: 抓取淘宝价格
    type: browser
    tool_name: "https://www.taobao.com"
    agent_id: agent
    prompt: |
      1. 在淘宝搜索「{{inputs.product_name}}」
      2. 找到销量最高的天猫商品
      3. 提取：商品名称、当前价格、原价、月销量、店铺名
    output_format: json

  - id: compare
    name: 生成比价报告
    type: agent
    after: [fetch_jd, fetch_taobao]
    agent_id: hermes-default
    prompt: |
      根据以下两个平台的价格数据，生成一份比价报告：
      
      京东数据：
      {{fetch_jd.output}}
      
      淘宝数据：
      {{fetch_taobao.output}}
      
      报告要求：
      1. 对比表格（平台 | 商品 | 价格 | 优惠 | 月销）
      2. 哪个平台更便宜
      3. 优惠力度分析
      4. 购买建议
    output_format: markdown

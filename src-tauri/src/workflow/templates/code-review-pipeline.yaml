id: code-review-pipeline
name: 代码审查流水线
description: 对代码进行自动化审查，生成报告
version: 1

trigger:
  type: manual

inputs:
  - name: code_path
    label: 代码路径或仓库
    type: string
    default: "."
    required: true
  - name: focus
    label: 审查重点
    type: enum
    options: [security, performance, maintainability, all]
    default: all

steps:
  - id: scan
    name: 扫描代码
    type: agent
    agent_id: hermes-default
    prompt: |
      扫描 {{inputs.code_path}} 目录下的代码文件，
      列出所有文件及其行数、主要语言、复杂度指标。
    output_format: json

  - id: review_parallel
    name: 并行审查
    type: parallel
    after: [scan]
    branches:
      - id: security_review
        name: 安全审查
        type: agent
        agent_id: hermes-default
        prompt: |
          对以下代码进行安全审查，重点关注：
          - SQL注入、XSS 等注入风险
          - 敏感信息泄露
          - 权限控制缺陷
          代码概览：{{scan.output}}
      - id: quality_review
        name: 质量审查
        type: agent
        agent_id: hermes-default
        prompt: |
          对以下代码进行质量审查，重点关注：
          - 代码重复
          - 命名规范
          - 函数长度
          - 测试覆盖
          代码概览：{{scan.output}}

  - id: report
    name: 生成报告
    type: agent
    after: [review_parallel]
    agent_id: hermes-default
    prompt: |
      汇总以下审查结果，生成最终报告：
      安全审查：{{security_review.output}}
      质量审查：{{quality_review.output}}
      
      分为 Critical / Warning / Suggestion 三个级别。
    output_format: markdown

id: ai-comic-pipeline
name: AI漫剧自动制作
description: 搜索热门视频 → 分析爆款规律 → 并行创作 → 人工审核 → 制作发布
version: 1

trigger:
  type: manual

inputs:
  - name: topic
    label: 主题关键词
    type: string
    default: "搞笑短剧"
    required: true
  - name: platform
    label: 目标平台
    type: enum
    options: [tiktok, youtube, douyin]
    default: tiktok

steps:
  - id: search
    name: 搜索热门视频
    type: agent
    agent_id: hermes-default
    prompt: |
      搜索 {{platform}} 上关于「{{topic}}」的热门短视频，
      找到播放量最高的5个，提取：标题、文案、点赞数、评论摘要。
    output_format: json

  - id: analyze
    name: 分析爆款规律
    type: agent
    after: [search]
    agent_id: hermes-default
    prompt: |
      基于以下热门视频数据，分析它们的共同特征和爆款规律：
      {{search.output}}
      
      输出：选题方向、情绪节奏、钩子设计、时长建议。
    output_format: json

  - id: create
    name: 并行创作
    type: parallel
    after: [analyze]
    branches:
      - id: script
        name: 写脚本
        type: agent
        agent_id: hermes-default
        prompt: |
          根据分析结果，写3个短剧脚本：
          {{analyze.output}}
      - id: storyboard
        name: 生成分镜
        type: agent
        agent_id: hermes-default
        prompt: |
          根据分析结果，为每个脚本生成分镜描述：
          {{analyze.output}}

  - id: review
    name: 人工审核
    type: approval
    after: [create]
    timeout_minutes: 1440
    approval_message: |
      脚本：{{script.output}}
      分镜：{{storyboard.output}}
      请审核以上内容。

  - id: route
    name: 路由
    type: branch
    after: [review]
    conditions:
      - expression: "review.approved == true"
        goto: produce
      - expression: "review.approved == false"
        goto: revise

  - id: revise
    name: 修改内容
    type: loop
    max_iterations: 3
    body:
      - id: fix_script
        name: 修改脚本
        type: agent
        agent_id: hermes-default
        prompt: "根据审核反馈修改脚本：{{review.feedback}}"
    exit_condition: "fix_script.score >= 8"
    after_done: review

  - id: produce
    name: 制作视频
    type: agent
    after: [route]
    agent_id: hermes-default
    prompt: |
      基于审核通过的脚本和分镜制作视频。
      脚本：{{script.output}}
      分镜：{{storyboard.output}}

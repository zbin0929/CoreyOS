id: ups-tracking
name: UPS 物流追踪
description: 自动登录 UPS.com 查询包裹物流状态（首次需要登录，之后自动复用登录态）
version: 1

trigger:
  type: manual

inputs:
  - name: tracking_number
    label: 追踪号码
    type: string
    default: "1Z999AA10123456784"
    required: true

steps:
  - id: track
    name: 查询物流
    type: browser
    tool_name: "https://www.ups.com/track"
    agent_id: agent
    browser_profile: "ups-session"
    prompt: |
      1. 在 UPS 追踪页面找到输入框
      2. 输入追踪号「{{inputs.tracking_number}}」
      3. 点击追踪按钮
      4. 等待结果加载
      5. 提取以下信息：
         - 当前状态（运输中/已送达/异常等）
         - 预计送达日期
         - 最近3条物流记录（时间、地点、事件）
      如果页面要求登录，请用页面上可用的「以访客身份追踪」选项。
    output_format: json

  - id: format
    name: 生成报告
    type: agent
    after: [track]
    agent_id: hermes-default
    prompt: |
      根据以下 UPS 物流数据生成一份清晰的追踪报告：
      {{track.output}}
      
      报告格式：
      1. 📦 包裹状态
      2. 📅 预计送达
      3. 📍 物流时间线（每条记录一行）
      4. ⚠️ 如有异常或延迟，给出提醒
    output_format: markdown

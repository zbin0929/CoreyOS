id: update-usd-exchange-rate
name: 每日美金汇率自动更新
description: |
  抓取中国银行美金现汇卖出价并更新到美正OS。
  从 srh.bankofchina.com 获取汇率数据（纯 HTTP，无需浏览器）。
  对应 REQUIREMENTS.md 需求 #1。
version: 1
trigger:
  type: cron
  expression: "0 30 9 * * *"
inputs: []

steps:
  - id: scrape_and_update
    name: 抓取汇率并更新美正OS
    type: agent
    after: []
    timeout_minutes: 2
    prompt: |
      **任务**：运行下面这一条命令，**原样返回它的 stdout（JSON）**，不要做任何分析或解释。

      ```bash
      set -e
      SCRIPTS_DIR="$HOME/.hermes/skill-packs/meizheng/scripts"
      VENV_PYTHON="$HOME/.hermes/hermes-agent/venv/bin/python"

      "$VENV_PYTHON" "$SCRIPTS_DIR/scrape_boc_usd_rate.py" > /tmp/boc-usd-rate.json
      cat /tmp/boc-usd-rate.json

      if grep -q '"error"' /tmp/boc-usd-rate.json; then
        echo "Scrape returned error, skipping API update."
        exit 0
      fi

      "$VENV_PYTHON" "$SCRIPTS_DIR/update_exchange_rate_via_api.py" /tmp/boc-usd-rate.json
      ```

      🔒 **铁律**：
      - 只执行这一条 bash 命令
      - 把 stdout 原样作为本步骤的输出
      - 退出码非 0 表示失败（不要重试，不要尝试用浏览器修复）
      - 禁止打开浏览器，禁止任何"自作主张"

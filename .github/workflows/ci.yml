name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────── Frontend (fast) ──────────────────────────
  # Single OS — TS/vitest output is platform-agnostic; we'd just be burning
  # CI minutes. Cross-OS surface is covered by the `rust` job below (where
  # it actually matters: Tauri + native deps).
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — the single source of truth is
      # `packageManager: "pnpm@9.12.0"` in package.json. Specifying both
      # triggers ERR_PNPM_BAD_PM_VERSION.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build (web bundle)
        run: pnpm build

      # Fails if any single chunk blows past the gzip budget (see
      # scripts/check-bundle-size.mjs for the rationale + knob to
      # override). Catches regressions like rehype-highlight's
      # all-languages preset sneaking back in after a refactor.
      - name: Bundle-size gate
        run: pnpm check:bundle-size

      # File-size gate. Locks in the OP-031..034 splits — fails if any
      # source file in src/ or src-tauri/src/ regrows past the hard cap.
      # Soft-warn threshold prints noisy advisories without blocking.
      # See scripts/check-file-sizes.mjs.
      - name: File-size gate
        run: pnpm check:file-sizes

      # IPC contract drift gate. Diffs Rust `#[tauri::command]` set
      # against `lib.rs` registrations and `src/lib/ipc.ts` invokes.
      # Per docs/phases/c4-ipc-type-safety.md we keep the TS mirror by
      # hand rather than introducing tauri-specta — this gate is the
      # automated half of that bargain.
      - name: IPC contract gate
        run: pnpm check:ipc-contract

  # ────────────────────────── E2E (Playwright) ──────────────────────────
  # Runs the full browser suite against the Vite dev server with IPC mocked
  # (see e2e/fixtures/tauri-mock.ts). No Rust build needed — this is the
  # regression net for UI + store + router interactions.
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Install Playwright's bundled Chromium + system libs. On CI,
      # playwright.config.ts drops the `channel: 'chrome'` override so we
      # use this Chromium directly (no Chrome on ubuntu-latest by default).
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────── Rust backend ────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # Tauri 2 Linux runtime deps (webkit2gtk + libsoup3 + co).
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libasound2-dev \
            patchelf

      # tauri::generate_context!() reads frontendDist from tauri.conf.json
      # (= "../dist") at proc-macro expansion time and panics if the path
      # doesn't exist. The Rust job doesn't need a real bundle — we're only
      # running clippy + unit tests — so a placeholder is enough to let the
      # macro pass its existence check.
      - name: Stub frontend dist for tauri::generate_context!
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p dist
          echo '<!doctype html><title>ci stub</title>' > dist/index.html

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: rustfmt check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --lib --all-targets -- -D warnings

      # `unwrap_used` baseline gate. Reports the legacy unwraps still
      # in the tree (mostly tests + DB modules) and fails if a commit
      # adds new ones. Bump scripts/clippy-unwrap-baseline.txt down
      # whenever you take a chunk out. Linux-only — clippy output is
      # platform-agnostic and we don't need to triple our minutes.
      - name: Setup Node (for unwrap_used gate)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Clippy unwrap_used baseline
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: node scripts/check-clippy-unwrap.mjs

      - name: Unit tests
        run: cargo test --lib

name: Release (macOS universal)

# Builds a universal-apple-darwin .dmg that runs on both Intel and
# Apple Silicon Macs. Manually-triggered only — bump version + create
# a draft Release matching the tag, then dispatch this workflow with
# that tag as `release_tag`.
#
# Cost: this repo is PUBLIC, so all GitHub Actions minutes (including
# macOS) are free. No pay-as-you-go to worry about.
#
# What this builds:
#   - Universal `Corey.app` (Intel x86_64 + arm64 fat binary)
#   - `Corey_<version>_universal.dmg` mounted installer
#   - Signed updater artifacts (`.zip` + `.sig`) — read by the
#     Tauri updater plugin from the GitHub Release `latest.json`
#     endpoint.
#
# What this does NOT do:
#   - Apple Developer ID signing / notarization. Users will see the
#     Gatekeeper "unidentified developer" prompt on first open and
#     need to right-click → Open. Buying an Apple Developer
#     account ($99/yr) + threading the cert through GitHub
#     Actions secrets would close that gap; we punt that until a
#     real customer asks.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to attach the .dmg to (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

jobs:
  build-macos-universal:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Universal binary needs both targets installed even when
      # the host is one of them (the linker has to know about both
      # ABIs to weave the fat binary).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: macos-universal

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      # Tauri-action's `args` flag passes the universal target
      # through to `tauri build`. Output lands at
      # `src-tauri/target/universal-apple-darwin/release/bundle/`.
      - name: Build + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.release_tag }}
          releaseName: 'Corey ${{ inputs.release_tag }}'
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Upload macOS artifacts to COS
        run: |
          TAG="${{ inputs.release_tag }}"
          BUCKET="${{ secrets.COS_BUCKET }}"
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          
          brew install coscli 2>/dev/null || true
          if ! command -v coscli &>/dev/null; then
            curl -sL https://cosbrowser.cloud.tencent.com/software/coscli/coscli-darwin-arm64 -o /usr/local/bin/coscli
            chmod +x /usr/local/bin/coscli
          fi
          
          echo "Uploading macOS artifacts to COS..."
          coscli cp "${BUNDLE_DIR}/dmg/" "cos://${BUCKET}/releases/${TAG}/" -r \
            -i "${{ secrets.COS_SECRET_ID }}" -k "${{ secrets.COS_SECRET_KEY }}" -e "cos.accelerate.myqcloud.com" || true
          coscli cp "${BUNDLE_DIR}/macos/" "cos://${BUCKET}/releases/${TAG}/" -r \
            -i "${{ secrets.COS_SECRET_ID }}" -k "${{ secrets.COS_SECRET_KEY }}" -e "cos.accelerate.myqcloud.com" || true
          
          echo "Files uploaded to cos://${BUCKET}/releases/${TAG}/"

      - name: Upload latest.json to COS (with COS URLs)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          BUCKET="${{ secrets.COS_BUCKET }}"
          REGION="cos.accelerate.myqcloud.com"
          COS_BASE="https://${BUCKET}.${REGION}/releases/${TAG}"

          LATEST_JSON_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}"
          ASSET_URL=$(curl -sL -H "Authorization: token ${GITHUB_TOKEN}" "${LATEST_JSON_URL}" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin).get('assets',[]); print(next((a['browser_download_url'] for a in assets if a['name']=='latest.json'),''))")

          if [ -n "${ASSET_URL}" ]; then
            curl -sL "${ASSET_URL}" -o latest.json
          else
            echo "latest.json not found in release assets, skipping"
            exit 0
          fi

          python3 -c "
          import json
          data = json.load(open('latest.json'))
          base = '${COS_BASE}'
          for p in data.get('platforms', {}).values():
              old_url = p.get('url', '')
              filename = old_url.split('/')[-1] if '/' in old_url else old_url
              p['url'] = f'{base}/{filename}'
          json.dump(data, open('latest.json', 'w'), indent=2)
          "

          echo "Uploading latest.json to COS..."
          coscli cp latest.json "cos://${BUCKET}/releases/latest.json" \
            -i "${{ secrets.COS_SECRET_ID }}" -k "${{ secrets.COS_SECRET_KEY }}" -e "${REGION}"
          echo "latest.json uploaded — URLs rewritten to COS"

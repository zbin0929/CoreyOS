name: Release (Windows)

# Windows is the only runner we pay for — macOS builds happen locally
# on the maintainer's Mac (see scripts/release-local.sh). Linux is not
# targeted. Trigger this workflow manually from the Actions tab after
# bumping the version so the attached artifacts match the local mac
# build.
#
# Cost model (private repo, pay-as-you-go):
#   ~$0.016/min × 15min build ≈ $0.25 per run.
#   GitHub Pro free tier: 3000 Linux-min/mo = 1500 Windows-min/mo,
#   i.e. ~100 builds before you spend a cent.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to attach the .msi to (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: windows-msvc

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Hermes used to be bundled here via `fetch-hermes-binary.mjs`,
      # but Hermes is a Python package and upstream releases never
      # ship a precompiled binary, so the step was always a no-op.
      # We now route users through the Settings → Home install card
      # + `hermes_install_preflight` IPC instead.

      - name: Build frontend
        run: pnpm build

      # Builds .msi + NSIS .exe + signed updater .zip + .sig under
      # src-tauri\target\release\bundle\. Uploaded to the existing
      # GitHub Release matching ${{ inputs.release_tag }}.
      - name: Build + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.release_tag }}
          releaseName: 'Corey ${{ inputs.release_tag }}'
          releaseDraft: true
          prerelease: false

      - name: Upload Windows artifacts to COS
        shell: bash
        run: |
          TAG="${{ inputs.release_tag }}"
          BUCKET="${{ secrets.COS_BUCKET }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          
          curl -sL https://cosbrowser.cloud.tencent.com/software/coscli/coscli-windows-amd64.exe -o coscli.exe
          
          echo "Uploading Windows artifacts to COS..."
          ./coscli.exe cp "${BUNDLE_DIR}/msi/" "cos://${BUCKET}/releases/${TAG}/" -r \
            -i "${{ secrets.COS_SECRET_ID }}" -k "${{ secrets.COS_SECRET_KEY }}" -e "cos.accelerate.myqcloud.com" || true
          ./coscli.exe cp "${BUNDLE_DIR}/nsis/" "cos://${BUCKET}/releases/${TAG}/" -r \
            -i "${{ secrets.COS_SECRET_ID }}" -k "${{ secrets.COS_SECRET_KEY }}" -e "cos.accelerate.myqcloud.com" || true
          
          echo "Files uploaded to cos://${BUCKET}/releases/${TAG}/"

      - name: Upload latest.json to COS (with COS URLs)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          BUCKET="${{ secrets.COS_BUCKET }}"
          REGION="cos.accelerate.myqcloud.com"
          COS_BASE="https://${BUCKET}.${REGION}/releases/${TAG}"

          LATEST_JSON_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}"
          ASSET_URL=$(curl -sL -H "Authorization: token ${GITHUB_TOKEN}" "${LATEST_JSON_URL}" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin).get('assets',[]); print(next((a['browser_download_url'] for a in assets if a['name']=='latest.json'),''))")

          if [ -n "${ASSET_URL}" ]; then
            curl -sL "${ASSET_URL}" -o latest.json
          else
            echo "latest.json not found in release assets, skipping"
            exit 0
          fi

          python3 -c "
          import json
          data = json.load(open('latest.json'))
          base = '${COS_BASE}'
          for p in data.get('platforms', {}).values():
              old_url = p.get('url', '')
              filename = old_url.split('/')[-1] if '/' in old_url else old_url
              p['url'] = f'{base}/{filename}'
          json.dump(data, open('latest.json', 'w'), indent=2)
          "

          echo "Uploading latest.json to COS..."
          ./coscli.exe cp latest.json "cos://${BUCKET}/releases/latest.json" \
            -i "${{ secrets.COS_SECRET_ID }}" -k "${{ secrets.COS_SECRET_KEY }}" -e "${REGION}"
          echo "latest.json uploaded — URLs rewritten to COS"

name: Release BGE-M3 offline pack

# B-5 — package the BGE-M3 ONNX model files into a single
# `bge-m3-offline.zip` (~2.3 GB) and upload to Tencent COS so
# offline / internal-network customers can grab the model without
# reaching huggingface / paddlenlp directly.
#
# Manual-trigger only. The model files don't change with every Corey
# release (BAAI updates BGE-M3 maybe once a year), so re-running this
# on every tag would burn ~2.3 GB of CI bandwidth + ~5 GB of COS
# storage per release for no value. The latest packaged zip stays
# at a stable URL (`releases/bge-m3-offline.zip`) and Settings →
# Knowledge points there.
#
# To regenerate: GitHub → Actions → Release BGE-M3 offline pack →
# Run workflow.

on:
  workflow_dispatch:
    inputs:
      output_name:
        description: 'COS output filename (default: bge-m3-offline.zip)'
        required: false
        default: 'bge-m3-offline.zip'
        type: string

permissions:
  contents: read

jobs:
  pack-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pack-bge-m3-offline.zip
        run: |
          chmod +x scripts/pack-bge-m3-offline.sh
          bash scripts/pack-bge-m3-offline.sh ./out
          ls -lh ./out/

      - name: Verify zip is non-empty
        run: |
          # Sanity check before burning COS bandwidth on a
          # corrupt zip. The 4 model files together are ~2.3 GB;
          # anything under 1 GB means the curl in the packing
          # script silently fell over (paddlenlp 503 / network
          # blip) and we need to abort before publishing a
          # truncated archive.
          SIZE=$(stat -c '%s' ./out/bge-m3-offline.zip)
          MIN=$((1024 * 1024 * 1024))
          if [ "$SIZE" -lt "$MIN" ]; then
            echo "::error::Packed zip is suspiciously small ($SIZE bytes < 1 GiB)"
            exit 1
          fi
          echo "Packed size: $(numfmt --to=iec --suffix=B $SIZE)"

      - name: Install coscli
        run: |
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64
          mv coscli-linux-amd64 coscli
          chmod +x coscli

      - name: Upload to Tencent COS
        run: |
          BUCKET="${{ secrets.COS_BUCKET }}"
          OUT_NAME="${{ inputs.output_name }}"
          ./coscli cp "./out/bge-m3-offline.zip" \
            "cos://${BUCKET}/releases/models/${OUT_NAME}" \
            -i "${{ secrets.COS_SECRET_ID }}" \
            -k "${{ secrets.COS_SECRET_KEY }}" \
            -e "cos.accelerate.myqcloud.com"
          echo "Uploaded to: https://${BUCKET}.cos.accelerate.myqcloud.com/releases/models/${OUT_NAME}"

      - name: Verify download URL
        run: |
          BUCKET="${{ secrets.COS_BUCKET }}"
          OUT_NAME="${{ inputs.output_name }}"
          URL="https://${BUCKET}.cos.accelerate.myqcloud.com/releases/models/${OUT_NAME}"
          # HEAD only — don't re-download 2.3 GB just to verify.
          curl -fsSI "$URL" | head -10
          echo "Public URL: $URL"

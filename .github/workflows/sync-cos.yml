name: Sync to Tencent COS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to sync (e.g. v0.1.8)'
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install coscli
        run: |
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64
          mv coscli-linux-amd64 coscli
          chmod +x coscli

      - name: Configure coscli
        run: |
          ./coscli config set -a "${{ secrets.COS_SECRET_ID }}" -s "${{ secrets.COS_SECRET_KEY }}" -b "${{ secrets.COS_BUCKET }}" -r ap-guangzhou

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          echo "Syncing release: $TAG"
          mkdir -p ./assets
          gh release download "$TAG" --repo "${{ github.repository }}" --dir ./assets
        shell: bash

      - name: Upload assets to COS
        run: |
          TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          ./coscli cp ./assets/ "cos://${{ secrets.COS_BUCKET }}/releases/${TAG}/" -r --include "*"

      - name: Generate and upload latest.json
        run: |
          TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          BUCKET="${{ secrets.COS_BUCKET }}"
          BASE="https://${BUCKET}.cos.ap-guangzhou.myqcloud.com/releases/${TAG}"

          ORIGINAL=$(cat ./assets/latest.json)

          UPDATED=$(echo "$ORIGINAL" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          base = '${BASE}'
          for p in data.get('platforms', {}).values():
              old_url = p.get('url', '')
              filename = old_url.split('/')[-1] if '/' in old_url else old_url
              p['url'] = f'{base}/{filename}'
          json.dump(data, sys.stdout, indent=2)
          ")

          echo "$UPDATED" > ./latest.json
          cat ./latest.json

          ./coscli cp ./latest.json "cos://${BUCKET}/releases/latest.json"

      - name: Verify
        run: |
          BUCKET="${{ secrets.COS_BUCKET }}"
          echo "COS latest.json: https://${BUCKET}.cos.ap-guangzhou.myqcloud.com/releases/latest.json"
          curl -sL "https://${BUCKET}.cos.ap-guangzhou.myqcloud.com/releases/latest.json" | head -5

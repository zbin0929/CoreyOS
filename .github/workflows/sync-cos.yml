name: Sync to Tencent COS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to sync (e.g. v0.1.8)'
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install coscli
        run: |
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64
          mv coscli-linux-amd64 coscli
          chmod +x coscli

      - name: Download release assets (parallel curl, fail-loud)
        run: |
          TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          mkdir -p ./assets

          FILES=(
            "latest.json"
            "Corey_${TAG#v}_universal.dmg"
            "Corey_universal.app.tar.gz"
            "Corey_universal.app.tar.gz.sig"
            "Corey_${TAG#v}_x64-setup.exe"
            "Corey_${TAG#v}_x64-setup.exe.sig"
            "Corey_${TAG#v}_x64_en-US.msi"
            "Corey_${TAG#v}_x64_en-US.msi.sig"
          )

          # Spawn parallel downloads, collect PIDs and the file each
          # downloads, then wait on each PID and surface failures.
          # Without this, a 404 in any background curl is silently
          # swallowed by `wait`, and later steps explode mysteriously
          # (cf. v0.1.12 sync failure where 8/8 assets were missing).
          declare -a PIDS=()
          declare -a NAMES=()
          for f in "${FILES[@]}"; do
            echo "Downloading $f..."
            curl -fSL -o "./assets/$f" "${BASE}/${f}" &
            PIDS+=($!)
            NAMES+=("$f")
          done

          FAILED=()
          for i in "${!PIDS[@]}"; do
            if ! wait "${PIDS[$i]}"; then
              FAILED+=("${NAMES[$i]}")
            fi
          done

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::Missing release assets for ${TAG}: ${FAILED[*]}"
            echo "::error::Run release-macos.yml + release-windows.yml for ${TAG} first."
            exit 1
          fi

          echo "All downloads complete"
          ls -lh ./assets/
        shell: bash

      - name: Upload assets to COS
        run: |
          TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          BUCKET="${{ secrets.COS_BUCKET }}"
          ./coscli cp ./assets/ "cos://${BUCKET}/releases/${TAG}/" -r \
            -i "${{ secrets.COS_SECRET_ID }}" \
            -k "${{ secrets.COS_SECRET_KEY }}" \
            -e "cos.accelerate.myqcloud.com"

      - name: Generate and upload latest.json
        run: |
          TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          BUCKET="${{ secrets.COS_BUCKET }}"
          BASE="https://${BUCKET}.cos.accelerate.myqcloud.com/releases/${TAG}"

          ORIGINAL=$(cat ./assets/latest.json)

          UPDATED=$(echo "$ORIGINAL" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          base = '${BASE}'
          for p in data.get('platforms', {}).values():
              old_url = p.get('url', '')
              filename = old_url.split('/')[-1] if '/' in old_url else old_url
              p['url'] = f'{base}/{filename}'
          json.dump(data, sys.stdout, indent=2)
          ")

          echo "$UPDATED" > ./latest.json
          cat ./latest.json

          ./coscli cp ./latest.json "cos://${BUCKET}/releases/latest.json" \
            -i "${{ secrets.COS_SECRET_ID }}" \
            -k "${{ secrets.COS_SECRET_KEY }}" \
            -e "cos.accelerate.myqcloud.com"

      - name: Verify
        run: |
          BUCKET="${{ secrets.COS_BUCKET }}"
          echo "COS latest.json: https://${BUCKET}.cos.accelerate.myqcloud.com/releases/latest.json"
          curl -sL "https://${BUCKET}.cos.accelerate.myqcloud.com/releases/latest.json" | head -5
